name: E2E

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # VITE_E2E=1 is set by playwright.config.js's webServer command, so the app
      # boots with the mock Supabase seam. No secrets needed: auth, data, and
      # storage are all in-memory. CI=1 (set by GitHub Actions) → headless + retries.
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
